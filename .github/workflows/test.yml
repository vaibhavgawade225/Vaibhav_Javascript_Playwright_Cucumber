name: Cucumber BDD Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '45 15 * * *'  # Runs at 9:15 PM IST (3:45 PM UTC) daily

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke tests
        run: npm run test:smoke
        env:
          HEADLESS: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-node${{ matrix.node-version }}
          path: reports/

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-node${{ matrix.node-version }}
          path: screenshots/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-node${{ matrix.node-version }}
          path: logs/

  send-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report-node20
          path: reports/

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs-node20
          path: logs/
        continue-on-error: true

      - name: Download failure screenshots
        uses: actions/download-artifact@v4
        with:
          name: failure-screenshots-node20
          path: screenshots/
        continue-on-error: true

      - name: Zip artifacts for email
        run: |
          zip -r test-report.zip reports/ logs/ screenshots/ 2>/dev/null || zip -r test-report.zip reports/ logs/ 2>/dev/null || zip -r test-report.zip reports/

      - name: Send email with report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Cucumber BDD Test Report - ${{ github.repository }} - ${{ needs.test.result }}"
          to: ${{ secrets.REPORT_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            Hello,

            The Cucumber BDD test pipeline has completed for repository: ${{ github.repository }}

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Overall Result: ${{ needs.test.result }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please find the test report attached.

            Regards,
            GitHub Actions
          attachments: test-report.zip
